services:
  postgres:
    image: postgres:16-alpine
    container_name: dental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental
      POSTGRES_DB: dental
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: dental-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dentalminio
      MINIO_ROOT_PASSWORD: dentalminio
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 dentalminio dentalminio;
      mc mb -p local/dental-media || true;
      mc anonymous set none local/dental-media;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
